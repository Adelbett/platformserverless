spring:
  datasource:
    url: jdbc:h2:mem:platformdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

app:
  kubernetes:
    enabled: false   # skip real K8s calls in dev/test
  prometheus:
    url: http://localhost:9090
  cors:
    allowed-origins:
      - "http://localhost:5173"
      - "http://localhost:3000"
      - "http://localhost:8080"

logging:
  level:
    com.platform: DEBUG
