spring:
  application:
    name: backend-api




  data:
    redis:
      host: localhost
      port: 6379
      

  elaqsticsearch:
    rest:
      uris: http://localhost:9200
      

  datasource:
    url: jdbc:postgresql://localhost:5432/platformserverless
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/platform}

server:
  port: 8080

# JWT Configuration
app:
  jwt:
    secret: "c2VjcmV0S2V5Rm9yUGxhdGZvcm1TZXJ2ZXJsZXNzUGxhdGZvcm1CYWNrZW5kQXBpMjAyNg=="  # base64 encoded secret
    expiration-ms: 86400000  # 24 hours

  # Kubernetes / Knative
  kubernetes:
    enabled: true
    namespace: default
    knative-api-version: serving.knative.dev/v1

  # CORS Configuration
  cors:
    allowed-origins: "http://localhost:5173,http://localhost:5174,http://localhost:3000,http://localhost:8080"

  # Keycloak Admin API
  keycloak:
    url: ${KEYCLOAK_URL:http://localhost:8081}
    realm: ${KEYCLOAK_REALM:platform}
    admin-username: ${KEYCLOAK_ADMIN_USER:admin}
    admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}
    client-id: ${KEYCLOAK_CLIENT_ID:platform-web}

  # Prometheus
  prometheus:
    url: http://localhost:9090

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

# Springdoc / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
  info:
    title: "Serverless Platform API"
    version: "1.0.0"
    description: "Backend API to manage Kubernetes/Knative serverless deployments"

logging:
  level:
    com.platform: DEBUG
    org.springframework.security: INFO
