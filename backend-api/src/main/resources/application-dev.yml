spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/platformserverless
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

app:
  kubernetes:
    enabled: false
  prometheus:
    url: http://localhost:9090
  cors:
    allowed-origins:
      - "http://localhost:5173"
      - "http://localhost:5174"
      - "http://localhost:3000"
      - "http://localhost:8080"

logging:
  level:
    com.platform: DEBUG
