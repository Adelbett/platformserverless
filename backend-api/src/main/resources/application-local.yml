server:
  port: 8082

spring:
  data:
    redis:
      host: localhost
      port: 6379

  datasource:
    url: jdbc:postgresql://localhost:5432/platformserverless
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

app:
  kubernetes:
    enabled: false
  prometheus:
    url: http://10.9.21.232:9090
  cors:
    allowed-origins: "http://localhost:5173,http://localhost:5174,http://localhost:3000,http://localhost:8082"

management:
  health:
    redis:
      enabled: false
    elasticsearch:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.platform: DEBUG
    org.springframework.security: INFO
